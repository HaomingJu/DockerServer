name: Docker Image CI

on:
  push:
    branches: [ "test" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag developflow:20.04.$(date +%s)
      working-directory: dev20.04
